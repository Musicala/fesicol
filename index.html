<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="FESICOL" />

  <title>Panel FESICOL · Musicala</title>
  <meta name="description" content="Panel de gestión del convenio FESICOL · Musicala. Acceso restringido." />
  <meta name="theme-color" content="#0C41C4" />
  <meta name="color-scheme" content="light only" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="image" href="logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css?v=20260701-1" />
</head>

<body>
  <noscript>
    <div style="max-width:920px;margin:16px auto;padding:14px 16px;border-radius:14px;border:1px solid rgba(17,24,39,.12);background:#fff;font-family:Inter,system-ui,sans-serif;color:#111827;">
      <b>Este panel necesita JavaScript</b> para funcionar. Actívalo y recarga.
    </div>
  </noscript>

  <!-- LOADER -->
  <div id="globalLoader" class="global-loader" hidden aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <div class="loader-text">Cargando…</div>
  </div>

  <!-- TOASTS -->
  <div id="toastHost" class="toast-host" aria-live="polite"></div>

  <!-- ===================== AUTH ===================== -->
  <section id="authView" class="auth-view" hidden aria-labelledby="authHeading">
    <div class="auth-shell">
      <header class="auth-brand">
        <img src="logo.png" alt="Logo Musicala" class="logo" />
        <div class="brand-text">
          <h1 id="authHeading" class="auth-title">Panel FESICOL</h1>
          <p class="muted">Acceso restringido</p>
        </div>
      </header>

      <div class="auth-card">
        <h2 class="auth-h">Ingresar</h2>
        <p class="muted auth-sub">Información sensible del convenio. Entra con tu usuario autorizado.</p>

        <form id="loginForm" class="form" autocomplete="on" novalidate>
          <label class="field" for="loginEmail">
            <span>Correo</span>
            <input id="loginEmail" name="email" type="email" autocomplete="email" placeholder="correo@musicala.co" required />
          </label>
          <label class="field" for="loginPass">
            <span>Contraseña</span>
            <input id="loginPass" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </label>

          <div class="auth-actions" style="display:flex;flex-direction:column;gap:12px;">
            <button id="btnLogin" class="btn primary" type="submit">Entrar</button>
            <div class="auth-separator" aria-hidden="true" style="display:flex;align-items:center;gap:10px;color:#6b7280;font-size:13px;font-weight:700;">
              <span style="height:1px;flex:1;background:rgba(17,24,39,.10)"></span>o<span style="height:1px;flex:1;background:rgba(17,24,39,.10)"></span>
            </div>
            <button id="btnGoogle" class="btn google" type="button">
              <span class="gdot" aria-hidden="true">G</span><span>Continuar con Google</span>
            </button>
          </div>

          <div id="authMsg" class="auth-msg" role="status" aria-live="polite"></div>
        </form>
      </div>
    </div>
  </section>

  <!-- ===================== APP (DASHBOARD) ===================== -->
  <div id="appView" class="dash" hidden>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="logo.png" alt="Musicala" class="logo" />
        <div>
          <strong>FESICOL</strong>
          <small class="muted">Convenio Musicala</small>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Secciones">
        <button class="nav-item active" data-view="resumen"><span>📊</span> Resumen</button>
        <button class="nav-item" data-view="ciclos"><span>🗓️</span> Ciclos y horarios</button>
        <button class="nav-item" data-view="estudiantes"><span>👥</span> Estudiantes</button>
        <button class="nav-item" data-view="inscripciones"><span>📝</span> Inscripciones</button>
        <button class="nav-item admin-only" data-view="planilla"><span>📥</span> Importar planilla</button>
        <button class="nav-item" data-view="facturacion"><span>💼</span> Facturación</button>
        <button class="nav-item" data-view="tarifas"><span>💲</span> Tarifas 2026</button>
        <button class="nav-item admin-only" data-view="usuarios"><span>🔐</span> Usuarios</button>
      </nav>

      <div class="sidebar-foot">
        <span class="muted" id="sessionEmail" title="Usuario activo">—</span>
        <button class="btn secondary sm" id="btnLogout" type="button">Salir</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="dash-main">
      <header class="dash-topbar">
        <button class="icon-btn only-mobile" id="btnMenu" aria-label="Menú">☰</button>
        <div>
          <h2 id="viewTitle">Resumen</h2>
          <p class="muted sm" id="viewSubtitle">Estado general del convenio</p>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <main class="dash-content" id="dashContent" role="main"></main>
    </div>
  </div>

  <!-- ===================== MODAL GENÉRICO ===================== -->
  <dialog id="modal" aria-labelledby="modalTitle">
    <div class="modal-head">
      <h4 id="modalTitle">—</h4>
      <button class="icon-btn" id="closeModal" type="button" aria-label="Cerrar">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </dialog>

  <script type="module" src="app.js?v=20260701-1"></script>
</body>
</html>
